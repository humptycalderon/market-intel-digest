name: Weekly Dev Report

on:
  schedule:
    - cron: '0 13 * * 1'  # 9:00 AM EDT (UTC-4) every Monday
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:

  # ── Dev Report (9:00 AM EDT) ─────────────────────────────────────────────
  dev-report:
    name: Dev Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dev report
        run: python run_dev_report.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_TOKEN:      ${{ secrets.NOTION_TOKEN }}

      - name: Upload dev report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-report-${{ github.run_id }}
          path: logs/dev_report_*.md
          retention-days: 90
